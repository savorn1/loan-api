spring.application.name=auth-service
server.port=8081

# DB
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT — must match the secret in api-gateway
jwt.secret=5JzoMqNmIFBDIk6nEqB6tCrLn2FGH4KkPcVpTZFm3UsXgYwRdUaE8lVjQ9sHbON0
jwt.expiration=86400000
# Refresh token lifetime (7 days), stored server-side in refresh_tokens so it can be revoked
jwt.refresh-expiration=604800000

# Actuator
management.endpoints.web.exposure.include=health,info

# Default admin account, created on first boot if a user with this username
# doesn't already exist yet (registration always creates Role.USER accounts).
seed.admin.enabled=true
seed.admin.username=admin
seed.admin.password=admin123
